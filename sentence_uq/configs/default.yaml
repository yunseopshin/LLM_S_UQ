# Default configuration for Bayesian sentence-level factuality UQ.
# Model-agnostic: dimensions are read from model.config at runtime.

model:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  selected_layers: null   # null -> auto-select evenly spaced layers
  dtype: bfloat16

# Dataset preparation and splitting (Phase 1-0)
dataset:
  setup: 2                          # 1, 2, or 3
  factscore_bio_dir: data/raw/factscore_bio
  longfact_dir: data/raw/longfact
  splits_dir: data/splits
  split_file: null                  # auto-generated if null
  seed: 42

# Generation outputs separated by dataset (Phase 1-1)
generation:
  factscore_bio_dir: data/generations/factscore_bio
  longfact_dir: data/generations/longfact
  max_new_tokens: 512
  temperature: 0.7
  top_p: 1.0
  batch_size: 1

# Cached per-token scalars (Phase 1-3)
cache:
  factscore_bio_dir: data/cache/factscore_bio
  longfact_dir: data/cache/longfact

# Annotation outputs (Phase 1-4)
processed:
  factscore_bio_dir: data/processed/factscore_bio
  longfact_dir: data/processed/longfact

# === Feature Extractor (Phase 2-1) ===
projection_dim: 64

# === Training (Phase 4-1) ===
num_epochs: 50
lr: 1.0e-3
num_fisher_iters: 10
prior_sigma_init: 1.0
batch_size: null
eval_every: 1
pd_check_every: 5

# === Output ===
results_dir: results/setup_2
